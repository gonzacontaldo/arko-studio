<!DOCTYPE html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <!-- ── SEO ──────────────────────────────────────────────────────────── -->
    <title>ARKO Studio | Fotografía y Tours Virtuales para Real Estate</title>
    <meta

    />
    <meta name="theme-color" content="#2d3435" />

    <!-- ── Open Graph (WhatsApp, LinkedIn, Facebook) ────────────────────── -->
    <meta property="og:type"        content="website" />
    <meta property="og:url"         content="https://arkostudio.com.ar/" />
    <meta property="og:title"       content="ARKO Studio | Fotografía y Tours Virtuales para Real Estate" />

      property="og:description"

    />
    <!-- Reemplazá esta URL con la imagen real de preview (1200×630 px recomendado) -->
    <meta property="og:image"       content="https://arkostudio.com.ar/og-preview.jpg" />
    <meta property="og:image:width" content="1200" />
    <meta property="og:image:height" content="630" />
    <meta property="og:locale"      content="es_AR" />
    <meta property="og:site_name"   content="ARKO Studio" />

    <!-- ── Twitter / X ─────────────────────────────────────────────────── -->
    <meta name="twitter:card"        content="summary_large_image" />
    <meta name="twitter:title"       content="ARKO Studio | Fotografía y Tours Virtuales para Real Estate" />

      name="twitter:description"
      content="Fotografía inmobiliaria, videos para redes y tours virtuales 360°. CABA y GBA."
    />
